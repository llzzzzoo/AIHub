<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AIHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; }
    body { display: flex; flex-direction: column; }

    #tab-bar {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 44px;
      background: #2b2b2b;
      user-select: none;
      -webkit-app-region: drag;
      padding: 0 140px;
      gap: 2px;
      position: relative;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-app-region: no-drag;
      border-radius: 8px 8px 0 0;
      height: 38px;
      min-width: 100px;
      max-width: 200px;
      position: relative;
      background: transparent;
    }

    .tab:hover { background: #383838; color: #ccc; }
    .tab.active { background: #1e1e1e; color: #e8e8e8; }
    .tab.drag-over { box-shadow: inset 2px 0 0 #888; }

    .tab-icon { width: 20px; height: 20px; border-radius: 3px; flex-shrink: 0; }

    .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .tab-close {
      display: flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 4px; border: none;
      background: transparent; color: #666; font-size: 14px;
      cursor: pointer; flex-shrink: 0; margin-left: auto; line-height: 1; padding: 0;
    }
    .tab-close:hover { background: #555; color: #e8e8e8; }

    #add-tab-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: #999; font-size: 18px;
      cursor: pointer; flex-shrink: 0; margin-left: 4px; margin-bottom: 5px;
      -webkit-app-region: no-drag; position: relative;
    }
    #add-tab-btn:hover { background: #383838; color: #e8e8e8; }

    #add-dropdown {
      display: none; position: absolute; top: 44px;
      background: #2f2f2f; border: 1px solid #444; border-radius: 8px;
      padding: 4px 0; min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 1001;
    }
    #add-dropdown.show { display: block; }

    #dropdown-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 1000;
    }
    #dropdown-overlay.show { display: block; }

    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; color: #ccc; font-size: 13px;
      cursor: pointer; transition: background 0.1s;
    }
    .dropdown-item:hover { background: #444; color: #fff; }
    .dropdown-item img { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }

    #ctx-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 1999;
    }
    #ctx-overlay.show { display: block; }

    #context-menu {
      display: none; position: fixed; background: #2a2a2a;
      border: 1px solid #3a3a3a; border-radius: 8px;
      padding: 4px 0; min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 2000;
    }
    #context-menu.show { display: block; }

    .ctx-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; color: #bbb; font-size: 12.5px;
      cursor: pointer; transition: background 0.1s;
    }
    .ctx-item:hover { background: #3a3a3a; color: #e8e8e8; }
    .ctx-item .shortcut { color: #666; font-size: 11px; margin-left: 24px; }
    .ctx-sep { height: 1px; background: #3a3a3a; margin: 4px 8px; }

    /* Usage bar */
    #usage-bar {
      position: absolute;
      right: 146px;
      top: 0;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .usage-item {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: default;
      position: relative;
    }

    .usage-label { font-size: 10px; color: #777; font-weight: 500; }

    .battery {
      width: 28px; height: 13px;
      border: 1.5px solid #666; border-radius: 2px;
      position: relative; display: flex;
      align-items: center; padding: 1.5px;
    }
    .battery::after {
      content: ''; position: absolute; right: -4px; top: 3px;
      width: 2px; height: 5px; background: #666; border-radius: 0 1px 1px 0;
    }
    .battery-fill { height: 100%; border-radius: 1px; transition: width 0.3s, background 0.3s; }

    .usage-tooltip {
      display: none; position: absolute; bottom: -32px; left: 50%;
      transform: translateX(-50%); background: #1e1e1e;
      border: 1px solid #444; border-radius: 4px;
      padding: 4px 8px; font-size: 10px; color: #ccc;
      white-space: nowrap; z-index: 100;
    }
    .usage-item:hover .usage-tooltip { display: block; }

    #mem-display { font-size: 10px; color: #666; }

    #refresh-usage-btn {
      background: none; border: none; color: #666; font-size: 13px;
      cursor: pointer; padding: 2px 4px; border-radius: 3px;
      display: flex; align-items: center;
    }
    #refresh-usage-btn:hover { color: #ccc; background: #383838; }
    #refresh-usage-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #webview-container { flex: 1; position: relative; background: #1e1e1e; }

    webview {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
    }
    webview.active { display: flex; }

    /* Hidden webviews for usage scraping */
    .usage-wv {
      position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;
    }
  </style>
</head>
<body>

      <span class="tab-label">NotebookLM</span>

    <button id="add-tab-btn" title="New tab">+</button>

    <!-- Usage bar -->
    <div id="usage-bar">

  <div id="dropdown-overlay"></div>
  <div id="ctx-overlay"></div>

    <div class="ctx-item" data-action="cut"><span>Cut</span><span class="shortcut">Ctrl+X</span></div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="selectAll"><span>Select All</span><span class="shortcut">Ctrl+A</span></div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" data-action="reload"><span>Reload</span><span class="shortcut">Ctrl+R</span></div>
    <div class="ctx-item" data-action="copyUrl"><span>Copy URL</span><span class="shortcut"></span></div>
  </div>

  <div id="webview-container">
    <webview class="active" src="https://chatgpt.com" partition="persist:chatgpt"></webview>
    <webview data-src="https://gemini.google.com/?hl=zh" partition="persist:gemini"></webview>
    <webview data-src="https://notebooklm.google.com" partition="persist:notebooklm"></webview>
    <!-- Hidden usage scraping webviews -->
    <webview class="usage-wv" id="claude-usage-wv" src="https://claude.ai/settings/usage" partition="persist:claude"></webview>
    <webview class="usage-wv" id="codex-usage-wv" src="https://chatgpt.com/codex/settings/usage" partition="persist:codex"></webview>
  </div>

  <script>
    const tabBar = document.getElementById('tab-bar');
    const webviewContainer = document.getElementById('webview-container');
    let dragSrcEl = null;

    function switchTo(index) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('webview:not(.usage-wv)').forEach(w => w.classList.remove('active'));
      document.querySelectorAll('.tab')[index].classList.add('active');
      const wv = document.querySelectorAll('webview:not(.usage-wv)')[index];
      wv.classList.add('active');
      if (!wv.src && wv.dataset.src) {
        wv.src = wv.dataset.src;
      }
    }

    function getActiveIndex() {
      const tabs = document.querySelectorAll('.tab');
      for (let i = 0; i < tabs.length; i++) {
        if (tabs[i].classList.contains('active')) return i;
      }
      return 0;
    }

    tabBar.addEventListener('click', (e) => {
      if (e.target.closest('.tab-close')) {
        const tab = e.target.closest('.tab');
        const tabs = [...document.querySelectorAll('.tab')];
        const index = tabs.indexOf(tab);
        const webviews = [...document.querySelectorAll('webview:not(.usage-wv)')];
        const wasActive = tab.classList.contains('active');
        tab.remove();
        webviews[index].remove();
        if (wasActive) {
          const remaining = document.querySelectorAll('.tab');
          if (remaining.length > 0) {
            const newIndex = Math.min(index, remaining.length - 1);
            switchTo(newIndex);
          }
        }
        return;
      }
      const tab = e.target.closest('.tab');
      if (!tab) return;
      const index = [...document.querySelectorAll('.tab')].indexOf(tab);
      switchTo(index);
    });

    const { ipcRenderer } = require('electron');
    ipcRenderer.on('switch-tab', (_, isShift) => {
      const total = document.querySelectorAll('.tab').length;
      const cur = getActiveIndex();
      const next = isShift ? (cur - 1 + total) % total : (cur + 1) % total;
      switchTo(next);
    });

    tabBar.addEventListener('dragstart', (e) => {
      dragSrcEl = e.target.closest('.tab');
      if (!dragSrcEl) return;
      e.dataTransfer.effectAllowed = 'move';
      dragSrcEl.style.opacity = '0.4';
    });

    tabBar.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const target = e.target.closest('.tab');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
      if (target && target !== dragSrcEl) target.classList.add('drag-over');
    });

    tabBar.addEventListener('dragleave', (e) => {
      const target = e.target.closest('.tab');
      if (target) target.classList.remove('drag-over');
    });

    tabBar.addEventListener('drop', (e) => {
      e.preventDefault();
      const target = e.target.closest('.tab');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
      if (!target || target === dragSrcEl) return;
      const tabs = [...document.querySelectorAll('.tab')];
      const webviews = [...document.querySelectorAll('webview:not(.usage-wv)')];
      const srcIdx = tabs.indexOf(dragSrcEl);
      const dstIdx = tabs.indexOf(target);
      if (srcIdx < dstIdx) {
        tabBar.insertBefore(dragSrcEl, target.nextSibling);
        webviewContainer.insertBefore(webviews[srcIdx], webviews[dstIdx].nextSibling);
      } else {
        tabBar.insertBefore(dragSrcEl, target);
        webviewContainer.insertBefore(webviews[srcIdx], webviews[dstIdx]);
      }
    });

    tabBar.addEventListener('dragend', () => {
      if (dragSrcEl) dragSrcEl.style.opacity = '1';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
      dragSrcEl = null;
    });

        icon: 'https://www.google.com/s2/favicons?domain=claude.ai&sz=32' },

    ];

    // Build dropdown items
    const addDropdown = document.getElementById('add-dropdown');
    sites.forEach(site => {
      const item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML = `<img src="${site.icon}"><span>${site.name}</span>`;
      item.addEventListener('click', () => { closeDropdown(); addTab(site); });
      addDropdown.appendChild(item);
    });

    const dropdownOverlay = document.getElementById('dropdown-overlay');
    function closeDropdown() {
      addDropdown.classList.remove('show');
      dropdownOverlay.classList.remove('show');
    }

    document.getElementById('add-tab-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const btn = document.getElementById('add-tab-btn');
      const rect = btn.getBoundingClientRect();
      addDropdown.style.left = rect.left + 'px';
      if (addDropdown.classList.contains('show')) { closeDropdown(); }
      else { addDropdown.classList.add('show'); dropdownOverlay.classList.add('show'); }
    });

    dropdownOverlay.addEventListener('click', closeDropdown);
    document.addEventListener('click', (e) => {
      if (!addDropdown.contains(e.target) && !document.getElementById('add-tab-btn').contains(e.target)) closeDropdown();
    });

    function addTab(site) {
      const addBtn = document.getElementById('add-tab-btn');
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.draggable = true;
      tab.innerHTML = `<img class="tab-icon" src="${site.icon}"><span class="tab-label">${site.name}</span><button class="tab-close" title="Close">&times;</button>`;
      tabBar.insertBefore(tab, addBtn);
      const wv = document.createElement('webview');
      wv.src = site.url;
      wv.setAttribute('partition', site.partition);
      webviewContainer.appendChild(wv);
      wv.addEventListener('dom-ready', () => wv.insertCSS(injectedCSS));
      const index = [...document.querySelectorAll('.tab')].indexOf(tab);
      switchTo(index);
    }

    // Custom context menu
    const ctxMenu = document.getElementById('context-menu');
    const ctxOverlay = document.getElementById('ctx-overlay');
    let ctxWcId = null;

    function closeCtxMenu() { ctxMenu.classList.remove('show'); ctxOverlay.classList.remove('show'); }

    ipcRenderer.on('show-context-menu', (_, { x, y, wcId }) => {
      ctxWcId = wcId;
      const tabBarHeight = document.getElementById('tab-bar').offsetHeight;
      let posX = x, posY = y + tabBarHeight;
      const mw = 180, mh = ctxMenu.offsetHeight || 200;
      if (posX + mw > window.innerWidth) posX = window.innerWidth - mw - 4;
      if (posY + mh > window.innerHeight) posY = window.innerHeight - mh - 4;
      ctxMenu.style.left = posX + 'px';
      ctxMenu.style.top = posY + 'px';
      ctxMenu.classList.add('show');
      ctxOverlay.classList.add('show');
    });

    ctxMenu.addEventListener('click', (e) => {
      const item = e.target.closest('.ctx-item');
      if (!item) return;
      ipcRenderer.send('context-menu-action', { action: item.dataset.action, wcId: ctxWcId });
      closeCtxMenu();
    });

    ctxOverlay.addEventListener('click', closeCtxMenu);
    ctxOverlay.addEventListener('contextmenu', (e) => { e.preventDefault(); closeCtxMenu(); });

    // Inject scrollbar style
    const injectedCSS = `
      ::-webkit-scrollbar { width: 5px !important; height: 5px !important; }
      ::-webkit-scrollbar-track { background: transparent !important; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15) !important; border-radius: 3px !important; border: none !important; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25) !important; }
      ::-webkit-scrollbar-corner { background: transparent !important; }
      ::-webkit-scrollbar-button { display: none !important; }
      html, body { overscroll-behavior: none !important; }
    `;
    document.querySelectorAll('webview:not(.usage-wv)').forEach(wv => {
      wv.addEventListener('dom-ready', () => wv.insertCSS(injectedCSS));
    });

    // ========== Usage Battery System ==========
    function setBattery(prefix, remaining, tooltip) {
      const fill = document.getElementById(prefix + '-fill');
      const tip = document.getElementById(prefix + '-tip');
      if (!fill) return;
      const r = Math.max(0, Math.min(100, remaining));
      fill.style.width = r + '%';
      if (r > 50) fill.style.background = '#4caf50';
      else if (r > 20) fill.style.background = '#ff9800';
      else fill.style.background = '#f44336';
      if (tooltip) tip.textContent = tooltip;
    }

    // Retry scraping until data is found
    function scrapeWithRetry(wv, scrapeFn, retries, delay) {
      let attempt = 0;
      function tryOnce() {
        scrapeFn(wv).then(ok => {
          if (!ok && attempt < retries) { attempt++; setTimeout(tryOnce, delay); }
        }).catch(() => {
          if (attempt < retries) { attempt++; setTimeout(tryOnce, delay); }
        });
      }
      tryOnce();
    }

    // Scrape Claude
    const claudeWv = document.getElementById('claude-usage-wv');
    function scrapeClaudeUsage(wv) {
      return wv.executeJavaScript(`
        (function() {
          var text = document.body ? document.body.innerText : '';
          var r = {};
          var m = text.match(/(\\d+)%\\s*used/g);
          if (m && m.length >= 1) r.s = 100 - parseInt(m[0]);
          if (m && m.length >= 2) r.w = 100 - parseInt(m[1]);
          var rt = text.match(/Resets\\s+in\\s+(.+)/i);
          if (rt) r.t = rt[1].split('\\n')[0].trim();
          return r;
        })()
      `).then(d => {
        if (d && d.s !== undefined) {
          let tip = 'Session: ' + d.s + '% left';
          if (d.w !== undefined) tip += ' | Week: ' + d.w + '%';
          if (d.t) tip += ' | Reset: ' + d.t;
          setBattery('claude', d.s, tip);
          return true;
        }
        return false;
      });
    }

    // Scrape Codex
    const codexWv = document.getElementById('codex-usage-wv');
    function scrapeCodexUsage(wv) {
      return wv.executeJavaScript(`
        (function() {
          var text = document.body ? document.body.innerText : '';
          var r = {};
          var m = text.match(/(\\d+)%/g);
          if (m && m.length >= 1) r.h = parseInt(m[0]);
          if (m && m.length >= 2) r.w = parseInt(m[1]);
          var b = text.match(/剩余额度[\\s\\S]*?(\\d+[\\d.]*)/);
          if (b) r.b = b[1];
          return r;
        })()
      `).then(d => {
        if (d && d.h !== undefined) {
          let tip = '5h: ' + d.h + '%';
          if (d.w !== undefined) tip += ' | Week: ' + d.w + '%';
          if (d.b !== undefined) tip += ' | Balance: $' + d.b;
          setBattery('codex', d.h, tip);
          return true;
        }
        return false;
      });
    }

    // Start scraping after webviews load
    claudeWv.addEventListener('dom-ready', () => {
      scrapeWithRetry(claudeWv, scrapeClaudeUsage, 10, 3000);
    });
    codexWv.addEventListener('dom-ready', () => {
      scrapeWithRetry(codexWv, scrapeCodexUsage, 10, 3000);
    });

    // Refresh button
    const refreshBtn = document.getElementById('refresh-usage-btn');
    function refreshUsage() {
      refreshBtn.classList.add('spinning');
      claudeWv.reload();
      codexWv.reload();
      // Wait for reload then scrape
      let done = 0;
      function checkDone() { if (++done >= 2) setTimeout(() => refreshBtn.classList.remove('spinning'), 500); }
      claudeWv.addEventListener('dom-ready', function onReload() {
        claudeWv.removeEventListener('dom-ready', onReload);
        scrapeWithRetry(claudeWv, scrapeClaudeUsage, 10, 3000);
        checkDone();
      });
      codexWv.addEventListener('dom-ready', function onReload() {
        codexWv.removeEventListener('dom-ready', onReload);
        scrapeWithRetry(codexWv, scrapeCodexUsage, 10, 3000);
        checkDone();
      });
    }
    refreshBtn.addEventListener('click', refreshUsage);

    // Memory display - update every 5s
    async function updateMemory() {
      try {
        const kb = await ipcRenderer.invoke('get-memory');
        const mb = Math.round(kb / 1024);
        const el = document.getElementById('mem-display');
        if (mb >= 1024) {
          el.textContent = (mb / 1024).toFixed(1) + ' GB';
        } else {
          el.textContent = mb + ' MB';
        }
        el.style.color = mb > 2048 ? '#f44336' : mb > 1024 ? '#ff9800' : '#666';
      } catch(e) {}
    }
    updateMemory();
    setInterval(updateMemory, 5000);
  </script>
</body>
</html>
